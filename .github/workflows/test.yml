name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8
          pip install selenium webdriver-manager

      - name: Run flake8
        run: flake8 insta_pruner/ --max-line-length=120 --ignore=E501

      - name: Check package builds
        run: |
          pip install build
          python -m build
